<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>нҶөлІҲм—ӯ м—°мҠө</title>
<link rel="apple-touch-icon" href="https://drive.google.com/uc?export=view&id=1-KqqHVJHINRnqCO7mAbjquhha6zttdTj">

<style>
:root {
  --teal: #0ea47a;
  --teal-light: #d1fae5;
  --teal-mid: #6ee7b7;
  --teal-dark: #065f46;
  --bg: #f0fdf4;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --muted: #64748b;
  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.12);
  --shadow-lg: 0 8px 28px rgba(0,0,0,.16);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  overflow-x: hidden;
  width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', 'Inter', sans-serif;
  font-size: 16px;
}

/* в”Җв”Җ нҷ”л©ҙ м „нҷҳ в”Җв”Җ */
.screen { display: none; }
.screen.active { display: block; }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TOP BAR
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 64px;
  gap: 8px;
}

.top-bar .title {
  flex: 1;
  text-align: center;
  font-size: 1.15rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.icon-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--bg); border-color: var(--teal); }
.icon-btn .em { font-size: 1.1rem; }

.home-btn {
  font-size: 1.6rem;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  border-radius: var(--radius-sm);
  transition: background .15s;
  flex-shrink: 0;
}
.home-btn:hover { background: var(--bg); }


.main-menu-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 9px 18px;
  border: 1.5px solid var(--teal);
  border-radius: 999px;
  background: var(--teal-light);
  color: var(--teal-dark);
  font-size: 0.95rem;
  font-weight: 800;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
  transition: background .15s, transform .15s, box-shadow .15s;
}
.main-menu-link:hover {
  background: var(--teal-mid);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.main-menu-link:active { transform: translateY(0); }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   HOME
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

.menu-body {
  padding: 36px 16px 48px;
  max-width: 760px;
  margin: 0 auto;
}
.menu-title {
  text-align: center;
  font-size: 1.75rem;
  font-weight: 800;
  margin-bottom: 8px;
  color: var(--teal-dark);
}
.menu-subtitle {
  text-align: center;
  color: var(--muted);
  font-size: 0.98rem;
  margin-bottom: 28px;
}
.menu-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}
.menu-btn {
  min-height: 160px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
  box-shadow: var(--shadow-md);
  cursor: pointer;
  padding: 24px 16px;
  font-family: inherit;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform .2s, box-shadow .2s, border-color .2s, background .2s;
}
.menu-btn:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--teal);
  background: linear-gradient(135deg, var(--surface), var(--teal-light));
}
.menu-btn:active { transform: translateY(-1px); }
.menu-emoji { font-size: 2.3rem; line-height: 1; }
.menu-label { font-size: 1.25rem; font-weight: 800; }
.menu-count {
  margin-top: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--bg);
  color: var(--teal-dark);
  font-size: 0.78rem;
  font-weight: 800;
}
.category-heading {
  font-size: 1.35rem;
  font-weight: 800;
  color: var(--teal-dark);
  margin-bottom: 14px;
  text-align: center;
}
.learn-sheet-heading {
  text-align: center;
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 700;
  margin: -2px 0 2px;
}

.home-body {
  padding: 20px 16px 40px;
  max-width: 760px;
  margin: 0 auto;
}

.search-wrap {
  position: relative;
  margin-bottom: 24px;
}
.search-wrap .search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.1rem;
  color: var(--muted);
  pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 14px 16px 14px 44px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  box-shadow: var(--shadow-sm);
}
#searchInput:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(14,164,122,.15);
}

.sheet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

.sheet-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 28px 16px;
  text-align: center;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform .2s, box-shadow .2s, border-color .2s;
  position: relative;
  overflow: hidden;
}
.sheet-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--teal-light), transparent);
  opacity: 0;
  transition: opacity .2s;
}
.sheet-btn:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--teal);
}
.sheet-btn:hover::before { opacity: 1; }
.sheet-btn:active { transform: translateY(0); }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   LEARN
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.learn-body {
  padding: 16px 16px 60px;
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* м№ҙл“ң кіөнҶө */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 28px 24px;
  position: relative;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
}

.card-text {
  font-size: 1.35rem;
  line-height: 1.65;
  font-weight: 500;
  text-align: left;
  word-break: keep-all;
  width: 100%;
}

/* м •лӢө лҚ®к°ң */
.answer-cover {
  position: absolute;
  inset: 0;
  background: var(--surface);
  border-radius: var(--radius-lg);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1rem;
  color: var(--muted);
  font-weight: 500;
  gap: 8px;
  z-index: 10;
  transition: opacity .2s;
}
.answer-cover .hint-icon { font-size: 1.4rem; }
.answer-cover.hide { display: none; }

/* TTS лІ„нҠј */
.tts-btn {
  position: absolute;
  right: 18px;
  bottom: 18px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .15s;
  z-index: 5;
}
.tts-btn:hover { background: var(--teal-light); transform: scale(1.1); }

/* лқјлІЁ л°°м§Җ */
.card-label {
  position: absolute;
  top: -1px;
  left: 22px;
  background: var(--teal);
  color: white;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 0 0 10px 10px;
  letter-spacing: .04em;
}

/* в”Җв”Җ м§„н–үлҘ  в”Җв”Җ */
.progress-wrap {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--muted);
}
.progress-bar-track {
  height: 8px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal-mid), var(--teal));
  border-radius: 99px;
  transition: width .25s ease;
}
#progressSlider {
  width: 100%;
  accent-color: var(--teal);
  cursor: pointer;
}

/* в”Җв”Җ м»ЁнҠёлЎӨ н–ү в”Җв”Җ */
.nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.nav-arrow {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  font-size: 1.4rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: background .15s, box-shadow .15s, transform .15s;
  flex-shrink: 0;
}
.nav-arrow:hover { background: var(--bg); box-shadow: var(--shadow-md); transform: scale(1.06); }
.nav-arrow:active { transform: scale(0.96); }
.nav-arrow:disabled { opacity: .35; pointer-events: none; }

.controls-center {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.ctrl-btn {
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 0.88rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  color: var(--text);
  transition: background .15s, border-color .15s, color .15s;
  white-space: nowrap;
}
.ctrl-btn:hover { background: var(--bg); border-color: var(--teal); }
.ctrl-btn.active {
  background: var(--teal);
  border-color: var(--teal);
  color: white;
}

.icon-mark {
  font-size: 1.6rem;
  cursor: pointer;
  transition: transform .15s;
  user-select: none;
}
.icon-mark:hover { transform: scale(1.2); }

/* м •лӢө ліҙкё° лІ„нҠј */
.show-answer-btn {
  width: 100%;
  padding: 18px;
  border-radius: var(--radius-md);
  border: none;
  background: var(--teal);
  color: white;
  font-size: 1.05rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: background .15s, transform .15s, box-shadow .15s;
}
.show-answer-btn:hover {
  background: var(--teal-dark);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.show-answer-btn:active { transform: translateY(0); }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   FAVORITE / SAVED
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.list-body {
  padding: 20px 16px 40px;
  max-width: 760px;
  margin: 0 auto;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 1rem;
}
.empty-state .em-icon { font-size: 3rem; display: block; margin-bottom: 12px; }

.fav-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px 52px 20px 22px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  position: relative;
  cursor: pointer;
  transition: box-shadow .15s, border-color .15s, transform .15s;
}
.fav-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--teal);
  transform: translateY(-2px);
}

.fav-sheet {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--teal);
  margin-bottom: 6px;
  letter-spacing: .04em;
}
.fav-ko {
  font-size: 1rem;
  font-weight: 500;
  line-height: 1.55;
  margin-bottom: 6px;
}
.fav-vi {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.5;
}

.fav-del {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  background: none;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  color: var(--muted);
  transition: background .15s, color .15s;
}
.fav-del:hover { background: #fee2e2; color: #dc2626; }

/* в”Җв”Җ лЎңл”© мҳӨлІ„л Ҳмқҙ в”Җв”Җ */
#loadingOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(4px);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  font-size: 1rem;
  color: var(--muted);
  font-weight: 600;
}
#loadingOverlay.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--teal-light);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* в”Җв”Җ л°ҳмқ‘нҳ• в”Җв”Җ */
@media (max-width: 600px) {
  .menu-grid { grid-template-columns: 1fr; }
  .menu-btn { min-height: 132px; }
  .card-text { font-size: 1.2rem; }
  .card { padding: 22px 20px; min-height: 140px; }
  .top-bar { height: 58px; }
  .icon-btn { padding: 7px 10px; font-size: 0.82rem; }
}
</style>
</head>

/* в”Җв”Җ Google Visualization JSONP лЎңлҚ” в”Җв”Җ */
function loadGvizTable(sheetName) {
  if (sheetCache.has(sheetName)) return Promise.resolve(sheetCache.get(sheetName));

  return new Promise((resolve, reject) => {
    const callbackName = '__gvizCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Google Sheets мқ‘лӢө мӢңк°„мқҙ мҙҲкіјлҗҳм—ҲмҠөлӢҲлӢӨ.'));
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = (response) => {
      cleanup();
      if (!response || response.status === 'error') {
        const detail = response?.errors?.map(e => e.detailed_message || e.message).join('\n') || 'м•Ң мҲҳ м—ҶлҠ” мҳӨлҘҳ';
        reject(new Error(detail));
        return;
      }
      const values = gvizToValues(response.table);
      sheetCache.set(sheetName, values);
      resolve(values);
    };

    const tqx = `out:json;responseHandler:${callbackName}`;
    const url = `https://docs.google.com/spreadsheets/d/${encodeURIComponent(SPREADSHEET_ID)}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=${encodeURIComponent(tqx)}`;
    script.src = url;
    script.onerror = () => {
      cleanup();
      reject(new Error('Google Sheets мҠӨнҒ¬лҰҪнҠёлҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ. мӢңнҠё кіөмң  м„Өм •мқ„ нҷ•мқён•ҳм„ёмҡ”.'));
    };
    document.head.appendChild(script);
  });
}

function cellValue(cell) {
  if (!cell) return '';
  if (cell.f !== undefined && cell.f !== null) return String(cell.f).trim();
  if (cell.v !== undefined && cell.v !== null) return String(cell.v).trim();
  return '';
}

function gvizToValues(table) {
  if (!table || !Array.isArray(table.rows)) return [];

  const labels = (table.cols || []).map(col => String(col.label || '').trim());
  const rows = table.rows.map(row => (row.c || []).map(cellValue));

  // Google Visualizationмқҙ мІ« н–үмқ„ н—ӨлҚ”лЎң мқёмӢқн•ң кІҪмҡ°, н—ӨлҚ”лҘј лӢӨмӢң л¶ҷм—¬ кё°мЎҙ нҢҢм„ңк°Җ мқҪкІҢ н•©лӢҲлӢӨ.
  if (isHeaderRow(labels)) return [labels, ...rows];
  return rows;
}

function isHeaderRow(row) {
  const joined = (row || []).map(v => String(v || '').trim().toLowerCase()).join('|');
  return /лІҲнҳё|number|no\.?|мҲңлІҲ|korean|н•ңкөӯ|н•ңкёҖ|ko|kr|vietnamese|лІ нҠёлӮЁ|vi|vn/.test(joined);
}

function findColumnIndex(headers, candidates, fallback) {
  const lower = headers.map(h => String(h || '').trim().toLowerCase());
  const idx = lower.findIndex(h => candidates.some(c => h.includes(c)));
  return idx >= 0 ? idx : fallback;
}

function normalizeSentences(values) {
  if (!Array.isArray(values) || values.length === 0) return [];

  const rows = values.filter(row => Array.isArray(row) && row.some(cell => String(cell || '').trim() !== ''));
  if (!rows.length) return [];

  const hasHeader = isHeaderRow(rows[0]);
  const headers = hasHeader ? rows[0] : [];
  const dataRows = hasHeader ? rows.slice(1) : rows;

  const numberIndex = hasHeader ? findColumnIndex(headers, ['лІҲнҳё', 'number', 'no', 'мҲңлІҲ'], 0) : 0;
  const koreanIndex = hasHeader ? findColumnIndex(headers, ['korean', 'н•ңкөӯ', 'н•ңкёҖ', 'ko', 'kr'], 1) : 1;
  const vietnameseIndex = hasHeader ? findColumnIndex(headers, ['vietnamese', 'лІ нҠёлӮЁ', 'vi', 'vn'], 2) : 2;

  return dataRows
    .map((row, index) => {
      const number = String(row[numberIndex] ?? index + 1).trim();
      const korean = String(row[koreanIndex] ?? '').trim();
      const vietnamese = String(row[vietnameseIndex] ?? '').trim();
      return { number, korean, vietnamese };
    })
    .filter(item => item.korean || item.vietnamese);
}

async function getSentences(sheetName) {
  const values = await loadGvizTable(sheetName);
  return normalizeSentences(values);
}

async function getFavoriteSentences(numbers) {

}

let currentSheet = '';

async function loadLearnSheet(sheetName, targetNumber = null) {

    currentSentences = await getSentences(sheetName);
    if (!currentSentences.length) {
      alert('мқҙ мӢңнҠём—җм„ң мқҪмқ„ л¬ёмһҘмқ„ м°ҫм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ. Aм—ҙ=лІҲнҳё, Bм—ҙ=н•ңкёҖ, Cм—ҙ=лІ нҠёлӮЁм–ҙ нҳ•мӢқмқём§Җ нҷ•мқён•ҳм„ёмҡ”.');
      return;
    }
    if (targetNumber !== null) {
      const idx = currentSentences.findIndex(s => String(s.number) === String(targetNumber));
      currentIndex = idx >= 0 ? idx : 0;
    } else {
      currentIndex = 0;
    }
    renderLearn();
  } catch(e) {
    console.error(e);
    alert('Google SheetлҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.\n\n' + e.message + '\n\nнҷ•мқё: мӢңнҠё кіөмң к°Җ вҖңл§ҒнҒ¬к°Җ мһҲлҠ” лӘЁл“  мӮ¬мҡ©мһҗ вҶ’ л·°м–ҙвҖқмқём§Җ нҷ•мқён•ҳм„ёмҡ”.');
  } finally {
    setLoading(false);
  }
}

function bookmarkKey(sheetName, number) {
  // кё°мЎҙ л¶Ғл§ҲнҒ¬ нҳёнҷҳмқ„ мң„н•ҙ нҷ”л©ҙ н‘ңмӢңлҠ” number кё°мӨҖмңјлЎң мң м§Җн•ҳлҗҳ, м ҖмһҘмқҖ sheet::number нҳ•нғңлҸ„ м§Җмӣҗн•©лӢҲлӢӨ.
  return `${sheetName}::${number}`;
}

function isBookmarked(item) {
  return Boolean(bookmarks[bookmarkKey(currentSheet, item.number)] || bookmarks[item.number]);
}

function renderLearn() {
  const item = currentSentences[currentIndex];
  if (!item) return;

  const total = currentSentences.length;
  const pos = currentIndex + 1;
  const pct = Math.round((pos / total) * 100);

  document.getElementById('learnTitle').textContent =
    `${currentSheet} вҖ” ${item.number}лІҲ`;

  document.getElementById('learnBookmark').textContent =
    isBookmarked(item) ? 'рҹ“•' : 'рҹ“ҳ';
  document.getElementById('learnSaveIcon').textContent =
    savedPages.some(p => p.sheet === currentSheet && String(p.number) === String(item.number))
      ? 'рҹ“Қ' : 'рҹ”–';

  const q = learnMode === 'KR_TO_VI' ? item.korean : item.vietnamese;
  const a = learnMode === 'KR_TO_VI' ? item.vietnamese : item.korean;
  document.getElementById('learnQuestion').textContent = q;
  document.getElementById('learnAnswer').textContent = a;

  document.getElementById('questionLabel').textContent =
    learnMode === 'KR_TO_VI' ? 'рҹҮ°рҹҮ· н•ңкөӯм–ҙ' : 'рҹҮ»рҹҮі лІ нҠёлӮЁм–ҙ';
  document.getElementById('answerLabel').textContent =
    learnMode === 'KR_TO_VI' ? 'рҹҮ»рҹҮі лІ нҠёлӮЁм–ҙ' : 'рҹҮ°рҹҮ· н•ңкөӯм–ҙ';

  document.getElementById('progressText').textContent = `${pos} / ${total}`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  const slider = document.getElementById('progressSlider');
  slider.max = total;
  slider.value = pos;

  cover.classList.toggle('hide', alwaysShowAnswer);

  document.getElementById('learnPrev').disabled = currentIndex === 0;
  document.getElementById('learnNext').disabled = currentIndex === total - 1;
  toggleBtn.textContent = alwaysShowAnswer ? 'м •лӢө н•ӯмғҒ мјңкё°' : 'м •лӢө н•ӯмғҒ лҒ„кё°';
  toggleBtn.classList.toggle('active', alwaysShowAnswer);
}

};

  alwaysShowAnswer = !alwaysShowAnswer;
  cover.classList.toggle('hide', alwaysShowAnswer);
  toggleBtn.textContent = alwaysShowAnswer ? 'м •лӢө н•ӯмғҒ мјңкё°' : 'м •лӢө н•ӯмғҒ лҒ„кё°';
  toggleBtn.classList.toggle('active', alwaysShowAnswer);
};

/* м •лӢө ліҙкё°/мҲЁкё°кё° */
document.getElementById('showAnswerBtn').onclick = () => {
  cover.classList.toggle('hide');
};

/* нҷҲ лІ„нҠј */
document.getElementById('learnGoHome').onclick = showMainMenu;
document.getElementById('learnMainMenuBtn').onclick = showMainMenu;

/* TTS */
function speak(text, lang) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
document.getElementById('learnTTS').onclick = () => {
  speak(document.getElementById('learnQuestion').textContent,
        learnMode === 'KR_TO_VI' ? 'ko-KR' : 'vi-VN');
};
document.getElementById('learnTTSAnswer').onclick = () => {
  speak(document.getElementById('learnAnswer').textContent,
        learnMode === 'KR_TO_VI' ? 'vi-VN' : 'ko-KR');
};

/* мҰҗкІЁм°ҫкё° нҶ кёҖ */
document.getElementById('learnBookmark').onclick = () => {
  const item = currentSentences[currentIndex];
  const key = bookmarkKey(currentSheet, item.number);
  if (isBookmarked(item)) {
    delete bookmarks[key];
    delete bookmarks[item.number]; // кё°мЎҙ м ҖмһҘк°’ м •лҰ¬
  } else {
    bookmarks[key] = true;
  }
  localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
  renderLearn();
};

/* л¶Ғл§ҲнҒ¬ нҶ кёҖ */
document.getElementById('learnSaveIcon').onclick = () => {
  const item = currentSentences[currentIndex];
  const idx = savedPages.findIndex(
    p => p.sheet === currentSheet && String(p.number) === String(item.number)
  );
  if (idx >= 0) savedPages.splice(idx, 1);
  else savedPages.push({ sheet: currentSheet, number: item.number, korean: item.korean });
  localStorage.setItem('savedPages', JSON.stringify(savedPages));
  renderLearn();
};

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ FAVORITE в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
document.getElementById('goFavorite').onclick = async () => {
  showScreen('favorite');
  setLoading(true);

  const favEntries = Object.keys(bookmarks);
  if (!favEntries.length) {
    document.getElementById('favoriteList').innerHTML =
      '<div class="empty-state"><span class="em-icon">рҹ“ҳ</span>мҰҗкІЁм°ҫкё°к°Җ м—ҶмҠөлӢҲлӢӨ</div>';
    setLoading(false);
    return;
  }

  try {
    const items = [];
    for (const entry of favEntries) {
      if (entry.includes('::')) {
        const [sheet, number] = entry.split('::');
        const rows = await getSentences(sheet);
        const found = rows.find(row => String(row.number) === String(number));
        if (found) items.push({ ...found, sheet });
      } else {
        // мҳҲм „ л°©мӢқмңјлЎң м ҖмһҘлҗң лІҲнҳёл§Ң мһҲлҠ” л¶Ғл§ҲнҒ¬лҸ„ мөңлҢҖн•ң ліөкө¬н•©лӢҲлӢӨ.
        const recovered = await getFavoriteSentences([entry]);
        items.push(...recovered);
      }
    }
    renderFavorite(items);
  } catch(e) {
    console.error(e);
    document.getElementById('favoriteList').innerHTML =
      `<div class="empty-state"><span class="em-icon">вҡ пёҸ</span>мҰҗкІЁм°ҫкё°лҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ<br>${e.message}</div>`;
  } finally {
    setLoading(false);
  }
};

function renderFavorite(items) {
  const box = document.getElementById('favoriteList');
  box.innerHTML = '';
  if (!items.length) {
    box.innerHTML = '<div class="empty-state"><span class="em-icon">рҹ“ҳ</span>мҰҗкІЁм°ҫкё°к°Җ м—ҶмҠөлӢҲлӢӨ</div>';
    return;
  }
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'fav-card';
    card.style.cursor = 'default';
    card.innerHTML = `
      <div class="fav-sheet">[${item.sheet}] ${item.number}лІҲ</div>
      <div class="fav-ko">${item.korean}</div>
      <div class="fav-vi">${item.vietnamese}</div>
    `;
    const del = document.createElement('button');
    del.className = 'fav-del';
    del.textContent = 'вң•';
    del.onclick = e => {
      e.stopPropagation();
      delete bookmarks[bookmarkKey(item.sheet, item.number)];
      delete bookmarks[item.number];
      localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
      card.remove();
    };
    card.appendChild(del);
    box.appendChild(card);
  });
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ SAVED в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
document.getElementById('goSaved').onclick = () => {
  showScreen('saved');
  renderSaved();
};

function renderSaved() {
  const box = document.getElementById('savedList');
  box.innerHTML = '';
  if (!savedPages.length) {
    box.innerHTML = '<div class="empty-state"><span class="em-icon">рҹ”–</span>м ҖмһҘлҗң нҺҳмқҙм§Җк°Җ м—ҶмҠөлӢҲлӢӨ</div>';
    return;
  }
  savedPages.forEach(item => {
    const card = document.createElement('div');
    card.className = 'fav-card';
    card.innerHTML = `
      <div class="fav-sheet">[${item.sheet}] ${item.number}лІҲ</div>
      <div class="fav-ko">${item.korean}</div>
    `;
    const del = document.createElement('button');
    del.className = 'fav-del';
    del.textContent = 'вң•';
    del.onclick = e => {
      e.stopPropagation();
      const idx = savedPages.findIndex(
        p => p.sheet === item.sheet && String(p.number) === String(item.number)
      );
      if (idx >= 0) savedPages.splice(idx, 1);
      localStorage.setItem('savedPages', JSON.stringify(savedPages));
      card.remove();
    };
    card.appendChild(del);

    card.onclick = () => {
      showScreen('learn');
      loadLearnSheet(item.sheet, item.number);
    };
    box.appendChild(card);
  });
}
</script>
