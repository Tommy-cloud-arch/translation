<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>통번역 연습</title>
<link href="https://drive.google.com/uc?export=view&amp;id=1-KqqHVJHINRnqCO7mAbjquhha6zttdTj" rel="apple-touch-icon"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<style>
:root {
  --accent: #10b981;
  --accent-dark: #047857;
  --accent-soft: #ecfdf5;
  --accent-mid: #a7f3d0;
  --ink: #0f172a;
  --text: #1e293b;
  --muted: #64748b;
  --line: #e2e8f0;
  --surface: rgba(255,255,255,.88);
  --surface-strong: #ffffff;
  --surface-soft: #f8fafc;
  --danger: #dc2626;
  --bg1: #f0fdf4;
  --bg2: #f8fafc;
  --radius-sm: 14px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --shadow-sm: 0 8px 24px rgba(15,23,42,.06);
  --shadow-md: 0 18px 42px rgba(15,23,42,.10);
  --shadow-lg: 0 28px 64px rgba(15,23,42,.14);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  font-family: 'Noto Sans KR', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(16,185,129,.12), transparent 28%),
    radial-gradient(circle at top right, rgba(14,165,233,.08), transparent 22%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
}
button, input { font-family: inherit; }
.screen { display: none; }
.screen.active { display: block; }

.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 74px;
  padding: 14px 18px;
  background: rgba(255,255,255,.72);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(226,232,240,.85);
}
.top-slot {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
}
.top-slot.grow {
  flex: 1 1 auto;
  min-width: 0;
  justify-content: center;
}
.top-title {
  font-size: clamp(1.05rem, 2vw, 1.2rem);
  font-weight: 800;
  color: var(--ink);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brand-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.brand-title::before {
  content: '✦';
  color: var(--accent);
  font-size: .95rem;
}

.icon-btn,
.main-menu-link,
.ctrl-btn,
.nav-arrow,
.home-btn,
.show-answer-btn,
.menu-btn,
.sheet-btn,
.tts-btn,
.fav-del {
  -webkit-tap-highlight-color: transparent;
}

.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 44px;
  padding: 10px 14px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.9);
  color: var(--ink);
  font-size: .92rem;
  font-weight: 700;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
}
.icon-btn:hover {
  transform: translateY(-1px);
  border-color: rgba(16,185,129,.35);
  box-shadow: var(--shadow-md);
  background: #fff;
}
.icon-btn .em { font-size: 1.05rem; }

.home-btn,
.nav-arrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 46px;
  height: 46px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.92);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.home-btn { font-size: 1.3rem; }
.nav-arrow { font-size: 1.2rem; }
.home-btn:hover, .nav-arrow:hover {
  transform: translateY(-1px);
  border-color: rgba(16,185,129,.4);
  box-shadow: var(--shadow-md);
}
.nav-arrow:disabled {
  opacity: .4;
  pointer-events: none;
}

.main-menu-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 10px 16px;
  border: 1px solid rgba(16,185,129,.28);
  border-radius: 999px;
  background: linear-gradient(180deg, #ffffff, var(--accent-soft));
  color: var(--accent-dark);
  font-size: .92rem;
  font-weight: 800;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
}
.main-menu-link:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.page-wrap {
  width: min(1120px, calc(100% - 28px));
  margin: 0 auto;
}

.menu-body,
.home-body,
.learn-body,
.list-body {
  width: min(980px, calc(100% - 28px));
  margin: 0 auto;
}

.menu-body {
  padding: 30px 0 54px;
}
.hero-card {
  background: linear-gradient(145deg, rgba(255,255,255,.94), rgba(255,255,255,.82));
  border: 1px solid rgba(226,232,240,.92);
  border-radius: 30px;
  box-shadow: var(--shadow-lg);
  padding: clamp(24px, 4vw, 36px);
  margin-bottom: 20px;
}
.menu-title {
  font-size: clamp(1.75rem, 4vw, 2.4rem);
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 10px;
  text-align: center;
}
.menu-subtitle {
  text-align: center;
  color: var(--muted);
  font-size: 1rem;
  line-height: 1.65;
  max-width: 620px;
  margin: 0 auto 26px;
}
.menu-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}
.menu-btn {
  min-height: 190px;
  border: 1px solid rgba(226,232,240,.95);
  border-radius: 24px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,250,252,.88));
  box-shadow: var(--shadow-md);
  cursor: pointer;
  padding: 22px 18px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: space-between;
  text-align: left;
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.menu-btn:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(16,185,129,.34);
}
.menu-icon {
  width: 56px;
  height: 56px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 18px;
  background: linear-gradient(180deg, var(--accent-soft), #fff);
  font-size: 1.65rem;
  box-shadow: inset 0 0 0 1px rgba(16,185,129,.1);
}
.menu-label {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--ink);
  margin-top: 14px;
}
.menu-count {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 999px;
  background: var(--surface-soft);
  color: var(--accent-dark);
  font-size: .84rem;
  font-weight: 800;
  border: 1px solid rgba(16,185,129,.14);
}

.home-body {
  padding: 26px 0 54px;
}
.section-card {
  background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.85));
  border: 1px solid rgba(226,232,240,.92);
  border-radius: 28px;
  box-shadow: var(--shadow-lg);
  padding: clamp(18px, 3vw, 28px);
}
.category-heading {
  font-size: clamp(1.3rem, 2.5vw, 1.65rem);
  font-weight: 800;
  color: var(--ink);
  text-align: center;
  margin-bottom: 16px;
}
.search-wrap {
  position: relative;
  margin-bottom: 18px;
}
.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 1rem;
}
#searchInput {
  width: 100%;
  min-height: 52px;
  padding: 14px 16px 14px 46px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: rgba(255,255,255,.95);
  color: var(--ink);
  font-size: 1rem;
  outline: none;
  box-shadow: var(--shadow-sm);
  transition: border-color .2s ease, box-shadow .2s ease;
}
#searchInput:focus {
  border-color: rgba(16,185,129,.48);
  box-shadow: 0 0 0 4px rgba(16,185,129,.12), var(--shadow-sm);
}
.sheet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.sheet-btn {
  border: 1px solid rgba(226,232,240,.92);
  border-radius: 20px;
  padding: 22px 18px;
  background: linear-gradient(180deg, #fff, #fbfdff);
  color: var(--ink);
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.5;
  text-align: left;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.sheet-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: rgba(16,185,129,.34);
}

.learn-body {
  padding: 22px 0 64px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.learn-sheet-heading {
  text-align: center;
  color: var(--muted);
  font-size: .95rem;
  font-weight: 700;
}
.card {
  position: relative;
  background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.9));
  border: 1px solid rgba(226,232,240,.92);
  border-radius: 28px;
  box-shadow: var(--shadow-lg);
  min-height: 190px;
  padding: 34px 28px 30px;
}
.card-label {
  position: absolute;
  top: 0;
  left: 22px;
  transform: translateY(-1px);
  padding: 7px 12px;
  border-radius: 0 0 14px 14px;
  background: var(--accent);
  color: white;
  font-size: .74rem;
  letter-spacing: .04em;
  font-weight: 800;
}
.card-text {
  width: 100%;
  font-size: clamp(1.18rem, 2.6vw, 1.45rem);
  line-height: 1.75;
  font-weight: 500;
  word-break: keep-all;
  color: var(--ink);
}
.answer-cover {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: 28px;
  background: rgba(255,255,255,.96);
  color: var(--muted);
  font-weight: 700;
  z-index: 10;
}
.answer-cover.hide { display: none; }
.hint-icon { font-size: 1.25rem; }
.tts-btn {
  position: absolute;
  right: 18px;
  bottom: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 999px;
  border: 1px solid rgba(226,232,240,.95);
  background: linear-gradient(180deg, #fff, var(--accent-soft));
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  font-size: 1rem;
}
.tts-btn:hover { box-shadow: var(--shadow-md); }
.progress-wrap,
.nav-panel,
.list-panel {
  background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.86));
  border: 1px solid rgba(226,232,240,.92);
  border-radius: 24px;
  box-shadow: var(--shadow-md);
  padding: 16px 18px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--muted);
  font-size: .9rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.progress-bar-track {
  height: 10px;
  border-radius: 999px;
  overflow: hidden;
  background: #e5e7eb;
  margin-bottom: 12px;
}
.progress-bar-fill {
  height: 100%;
  width: 0;
  border-radius: 999px;
  background: linear-gradient(90deg, #34d399, #10b981);
  transition: width .25s ease;
}
#progressSlider {
  width: 100%;
  accent-color: var(--accent);
}
.nav-panel {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}
.controls-center {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  flex: 1;
}
.ctrl-btn {
  min-height: 44px;
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.94);
  color: var(--ink);
  font-size: .9rem;
  font-weight: 700;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
}
.ctrl-btn:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
  border-color: rgba(16,185,129,.34);
}
.ctrl-btn.active {
  background: linear-gradient(180deg, #10b981, #059669);
  color: #fff;
  border-color: transparent;
}
.icon-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.95);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  font-size: 1.15rem;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.icon-mark:hover {
  transform: translateY(-1px) scale(1.03);
  box-shadow: var(--shadow-md);
  border-color: rgba(16,185,129,.34);
}
.show-answer-btn {
  min-height: 54px;
  width: 100%;
  border: 0;
  border-radius: 18px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff;
  font-size: 1rem;
  font-weight: 800;
  box-shadow: var(--shadow-md);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
}
.show-answer-btn:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

.list-body {
  padding: 26px 0 54px;
}
.list-panel { padding: 18px; }
.empty-state {
  text-align: center;
  color: var(--muted);
  padding: 42px 18px;
  font-size: 1rem;
}
.empty-state .em-icon {
  display: block;
  font-size: 2.8rem;
  margin-bottom: 12px;
}
.fav-card {
  position: relative;
  padding: 20px 52px 18px 20px;
  background: linear-gradient(180deg, #fff, #fbfdff);
  border: 1px solid rgba(226,232,240,.92);
  border-radius: 22px;
  box-shadow: var(--shadow-sm);
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.fav-card + .fav-card { margin-top: 12px; }
.fav-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: rgba(16,185,129,.32);
}
.fav-sheet {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: .78rem;
  font-weight: 800;
  color: var(--accent-dark);
  margin-bottom: 8px;
}
.fav-ko {
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.65;
  color: var(--ink);
  margin-bottom: 7px;
}
.fav-vi {
  font-size: .95rem;
  color: var(--muted);
  line-height: 1.6;
}
.fav-del {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 34px;
  height: 34px;
  border-radius: 999px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 1rem;
}
.fav-del:hover {
  background: #fef2f2;
  color: var(--danger);
  border-color: #fecaca;
}

#loadingOverlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(8px);
  z-index: 999;
  color: var(--muted);
  font-weight: 700;
}
#loadingOverlay.show { display: flex; }
.spinner {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 3px solid rgba(16,185,129,.16);
  border-top-color: var(--accent);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  color: var(--danger);
  font-size: 1rem;
  line-height: 1.65;
  padding: 18px;
  background: #fff;
  border: 1px solid #fecaca;
  border-radius: 18px;
}

@media (max-width: 860px) {
  .menu-grid { grid-template-columns: 1fr; }
  .nav-panel {
    flex-direction: column;
    align-items: stretch;
  }
  .nav-arrow-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    width: 100%;
  }
  .controls-center { width: 100%; }
}

@media (max-width: 640px) {
  .top-bar {
    min-height: 68px;
    padding: 12px 12px;
    gap: 8px;
  }
  .icon-btn { padding: 9px 12px; font-size: .86rem; }
  .icon-btn .label-text { display: none; }
  .menu-body,
  .home-body,
  .learn-body,
  .list-body {
    width: min(100%, calc(100% - 18px));
  }
  .hero-card,
  .section-card,
  .progress-wrap,
  .nav-panel,
  .list-panel {
    border-radius: 22px;
  }
  .card {
    min-height: 160px;
    padding: 30px 20px 24px;
    border-radius: 22px;
  }
  .answer-cover { border-radius: 22px; }
  .card-text { font-size: 1.14rem; }
  .sheet-grid { grid-template-columns: 1fr; }
  .nav-arrow-row { display: flex; width: 100%; justify-content: space-between; }
}


/* ── SVG icon system / dark mode / compact controls ── */
.svg-icon {
  width: 1.18em;
  height: 1.18em;
  display: inline-block;
  vertical-align: -0.16em;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.icon-only .svg-icon,
.home-btn .svg-icon,
.nav-arrow .svg-icon,
.tts-btn .svg-icon,
.icon-mark .svg-icon,
.theme-toggle .svg-icon { width: 20px; height: 20px; }
.menu-icon .svg-icon { width: 30px; height: 30px; }
.search-icon .svg-icon { width: 19px; height: 19px; }
.hint-icon .svg-icon { width: 22px; height: 22px; }
.brand-title::before { content: none; }
.brand-mark {
  width: 28px;
  height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(16,185,129,.18), rgba(14,165,233,.12));
  color: var(--accent-dark);
}
.theme-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.9);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
}
.theme-toggle:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); border-color: rgba(16,185,129,.34); }
.top-actions { display: inline-flex; align-items: center; gap: 8px; }
.menu-btn {
  align-items: center !important;
  justify-content: center !important;
  text-align: center !important;
  gap: 14px;
}
.menu-btn > div { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.menu-label { margin-top: 0 !important; }
.menu-count { margin-top: 2px; }
.nav-panel {
  display: grid !important;
  grid-template-columns: 48px 1fr 48px;
  align-items: center;
  gap: 12px;
  padding: 12px !important;
}
.controls-center {
  background: var(--surface-soft);
  border: 1px solid rgba(226,232,240,.72);
  border-radius: 999px;
  padding: 6px;
  justify-content: center;
}
.ctrl-btn, .icon-mark { box-shadow: none !important; }
.icon-mark { color: var(--accent-dark); }
.list-search-wrap { margin-bottom: 14px; }
.list-search-wrap input {
  width: 100%;
  min-height: 50px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: rgba(255,255,255,.95);
  color: var(--ink);
  outline: none;
  padding: 13px 16px 13px 46px;
  font-size: .98rem;
  box-shadow: var(--shadow-sm);
}
.list-search-wrap input:focus {
  border-color: rgba(16,185,129,.48);
  box-shadow: 0 0 0 4px rgba(16,185,129,.12), var(--shadow-sm);
}
.empty-state .svg-icon { width: 40px; height: 40px; color: var(--accent-dark); margin: 0 auto 12px; display: block; }
.fav-del .svg-icon { width: 17px; height: 17px; }

html[data-theme="dark"] {
  --accent: #34d399;
  --accent-dark: #6ee7b7;
  --accent-soft: rgba(16,185,129,.13);
  --accent-mid: rgba(52,211,153,.35);

function icon(name) { return ICONS[name] || ''; }
function renderStaticIcons() {
  document.querySelectorAll('[data-icon]').forEach(el => {
    const name = el.dataset.icon;
    if (name && ICONS[name]) el.innerHTML = ICONS[name];
  });
}
function setTheme(theme) {
  document.documentElement.dataset.theme = theme;
  localStorage.setItem('theme', theme);
  document.querySelectorAll('.theme-toggle').forEach(btn => {
    btn.innerHTML = icon(theme === 'dark' ? 'sun' : 'moon');
    btn.title = theme === 'dark' ? '라이트모드 전환' : '다크모드 전환';
    btn.setAttribute('aria-label', btn.title);
  });
}
function initTheme() {
  const saved = localStorage.getItem('theme');
  const preferred = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  setTheme(saved || preferred);
  document.querySelectorAll('.theme-toggle').forEach(btn => {
    btn.addEventListener('click', () => setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'));
  });
}
function emptyState(iconName, text) {

let learnMode = 'KR_TO_VI';
let alwaysShowAnswer = false;
let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '{}');
let savedPages = JSON.parse(localStorage.getItem('savedPages') || '[]');
let currentFavoriteItems = [];
let currentSavedItems = [];

const overlay = document.getElementById('loadingOverlay');
const cover = document.getElementById('answerCover');
const toggleBtn = document.getElementById('answerToggleBtn');

function setLoading(on) {
  overlay.classList.toggle('show', on);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function showGridError(message) {
  document.getElementById('sheetGrid').innerHTML = `<div class="error-box">${icon('alert')} ${message}</div>`;
}

function parseDateFromName(name) {
  const match = String(name).match(/(20\d{6})/);
  return match ? Number(match[1]) : null;
}

function sortSheetsForCategory(categoryKey, sheets) {
  const list = [...sheets];
  if (categoryKey === 'sermon') {
    return list.sort((a, b) => {
      const dateA = parseDateFromName(a) ?? Number.MAX_SAFE_INTEGER;
      const dateB = parseDateFromName(b) ?? Number.MAX_SAFE_INTEGER;
      if (dateA !== dateB) return dateA - dateB;
      return a.localeCompare(b, 'ko');
    });
  }
  return list.sort((a, b) => a.localeCompare(b, 'ko'));
}

async function fetchSheetNames() {
  const fields = 'sheets(properties(title))';
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(SPREADSHEET_ID)}?fields=${encodeURIComponent(fields)}&key=${encodeURIComponent(GOOGLE_SHEETS_API_KEY)}`;
  const response = await fetch(url);
  const data = await response.json().catch(() => null);

  if (!response.ok || data?.error) {
    throw new Error(data?.error?.message || '구글시트 탭 목록을 불러오지 못했습니다.');
  }

  const names = (data.sheets || [])
    .map(sheet => sheet?.properties?.title)
    .filter(Boolean);

  if (!names.length) {
    throw new Error('구글시트에서 탭 이름을 찾지 못했습니다.');
  }

  return names;
}

function loadGvizTable(sheetName) {
  if (sheetCache.has(sheetName)) return Promise.resolve(sheetCache.get(sheetName));

  return new Promise((resolve, reject) => {
    const callbackName = '__gvizCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Google Sheets 응답 시간이 초과되었습니다.'));
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = (response) => {
      cleanup();
      if (!response || response.status === 'error') {
        const detail = response?.errors?.map(e => e.detailed_message || e.message).join('\n') || '알 수 없는 오류';
        reject(new Error(detail));
        return;
      }
      const values = gvizToValues(response.table);
      sheetCache.set(sheetName, values);
      resolve(values);
    };

    const tqx = `out:json;responseHandler:${callbackName}`;
    const url = `https://docs.google.com/spreadsheets/d/${encodeURIComponent(SPREADSHEET_ID)}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=${encodeURIComponent(tqx)}`;
    script.src = url;
    script.onerror = () => {
      cleanup();
      reject(new Error('Google Sheets 스크립트를 불러오지 못했습니다. 시트 공유 설정을 확인하세요.'));
    };
    document.head.appendChild(script);
  });
}

function cellValue(cell) {
  if (!cell) return '';
  if (cell.f !== undefined && cell.f !== null) return String(cell.f).trim();
  if (cell.v !== undefined && cell.v !== null) return String(cell.v).trim();
  return '';
}

function gvizToValues(table) {
  if (!table || !Array.isArray(table.rows)) return [];
  const labels = (table.cols || []).map(col => String(col.label || '').trim());
  const rows = table.rows.map(row => (row.c || []).map(cellValue));
  if (isHeaderRow(labels)) return [labels, ...rows];
  return rows;
}

function isHeaderRow(row) {
  const joined = (row || []).map(v => String(v || '').trim().toLowerCase()).join('|');
  return /번호|number|no\.?|순번|korean|한국|한글|ko|kr|vietnamese|베트남|vi|vn/.test(joined);
}

function findColumnIndex(headers, candidates, fallback) {
  const lower = headers.map(h => String(h || '').trim().toLowerCase());
  const idx = lower.findIndex(h => candidates.some(c => h.includes(c)));
  return idx >= 0 ? idx : fallback;
}

function normalizeSentences(values) {
  if (!Array.isArray(values) || values.length === 0) return [];
  const rows = values.filter(row => Array.isArray(row) && row.some(cell => String(cell || '').trim() !== ''));
  if (!rows.length) return [];

  const hasHeader = isHeaderRow(rows[0]);
  const headers = hasHeader ? rows[0] : [];
  const dataRows = hasHeader ? rows.slice(1) : rows;

  const numberIndex = hasHeader ? findColumnIndex(headers, ['번호', 'number', 'no', '순번'], 0) : 0;
  const koreanIndex = hasHeader ? findColumnIndex(headers, ['korean', '한국', '한글', 'ko', 'kr'], 1) : 1;
  const vietnameseIndex = hasHeader ? findColumnIndex(headers, ['vietnamese', '베트남', 'vi', 'vn'], 2) : 2;

  return dataRows
    .map((row, index) => {
      const number = String(row[numberIndex] ?? index + 1).trim();
      const korean = String(row[koreanIndex] ?? '').trim();
      const vietnamese = String(row[vietnameseIndex] ?? '').trim();
      return { number, korean, vietnamese };
    })
    .filter(item => item.korean || item.vietnamese);
}

async function getSentences(sheetName) {
  const values = await loadGvizTable(sheetName);
  return normalizeSentences(values);
}

async function getFavoriteSentences(numbers) {
  const wanted = new Set(numbers.map(String));
  const result = [];

  for (const sheet of allSheets) {
    try {
      const rows = await getSentences(sheet);
      rows.forEach(item => {
        if (wanted.has(String(item.number))) result.push({ ...item, sheet });
      });
    } catch (e) {
      console.warn(`단어장 로딩 실패: ${sheet}`, e);
    }
  }
  return result;
}

async function initHome() {
  setLoading(true);
  try {
    allSheets = await fetchSheetNames();
    allSheets.sort((a, b) => {
      if (a === DEFAULT_SHEET) return -1;
      if (b === DEFAULT_SHEET) return 1;
      return a.localeCompare(b, 'ko');
    });
    updateCategoryCounts();
    showMainMenu();
  } catch (e) {
    console.error(e);
    allSheets = [];
    updateCategoryCounts();
    showMainMenu();
    alert(`구글시트 탭 목록을 불러오지 못했습니다.\n\n${e.message}\n\nAPI 키 제한, Google Sheets API 활성화, 스프레드시트 공유 권한을 확인하세요.`);
  } finally {
    setLoading(false);
  }
}

function updateCategoryCounts() {
  Object.entries(CATEGORY_CONFIG).forEach(([key, config]) => {
    const count = allSheets.filter(config.test).length;
    const el = document.getElementById(config.countId);
    if (el) el.textContent = `${count}개`;
  });
}

function showMainMenu() {
  currentCategoryKey = null;
  currentCategorySheets = [];
  document.getElementById('mainMenuArea').style.display = 'block';
  document.getElementById('sheetListArea').style.display = 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('topAppTitle').style.display = 'inline-flex';
  document.getElementById('topMainMenuBtn').style.display = 'none';
  showScreen('home');
}

function openCategory(categoryKey) {
  const config = CATEGORY_CONFIG[categoryKey];
  if (!config) return;

  currentCategoryKey = categoryKey;
  currentCategorySheets = sortSheetsForCategory(categoryKey, allSheets.filter(config.test));

  document.getElementById('categoryHeading').textContent = config.label;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchInput').placeholder = `${config.label} 시트 이름 검색...`;
  document.getElementById('mainMenuArea').style.display = 'none';
  document.getElementById('sheetListArea').style.display = 'block';
  document.getElementById('topAppTitle').style.display = 'none';
  document.getElementById('topMainMenuBtn').style.display = 'inline-flex';

  renderSheetGrid(currentCategorySheets);
  showScreen('home');
}

function renderSheetGrid(list) {
  const grid = document.getElementById('sheetGrid');
  grid.innerHTML = '';
  if (!list.length) {
    const label = currentCategoryKey ? CATEGORY_CONFIG[currentCategoryKey].label : '시트';
    grid.innerHTML = emptyState('folder', `${label} 결과가 없습니다`);
    return;
  }
  list.forEach(name => {
    const div = document.createElement('button');
    div.type = 'button';
    div.className = 'sheet-btn';
    div.textContent = name;
    div.onclick = () => {
      loadLearnSheet(name);
      showScreen('learn');
    };
    grid.appendChild(div);
  });
}

async function loadLearnSheet(sheetName, targetNumber = null) {
  setLoading(true);
  currentSheet = sheetName;
  try {
    currentSentences = await getSentences(sheetName);
    if (!currentSentences.length) {
      alert('이 시트에서 읽을 문장을 찾지 못했습니다. A열=번호, B열=한글, C열=베트남어 형식인지 확인하세요.');
      return;
    }
    if (targetNumber !== null) {
      const idx = currentSentences.findIndex(s => String(s.number) === String(targetNumber));
      currentIndex = idx >= 0 ? idx : 0;
    } else {
      currentIndex = 0;
    }
    renderLearn();
  } catch (e) {
    console.error(e);
    alert(`Google Sheet를 불러오지 못했습니다.\n\n${e.message}\n\n확인: 시트 공유가 '링크가 있는 모든 사용자 → 뷰어'인지 확인하세요.`);
  } finally {
    setLoading(false);
  }
}

function bookmarkKey(sheetName, number) {
  return `${sheetName}::${number}`;
}

function isBookmarked(item) {
  return Boolean(bookmarks[bookmarkKey(currentSheet, item.number)] || bookmarks[item.number]);
}

function renderLearn() {
  const item = currentSentences[currentIndex];
  if (!item) return;

  const total = currentSentences.length;
  const pos = currentIndex + 1;
  const pct = Math.round((pos / total) * 100);

  document.getElementById('learnTitle').textContent = `${currentSheet} — ${item.number}번`;
  document.getElementById('learnBookmark').innerHTML = icon(isBookmarked(item) ? 'bookFilled' : 'book');
  document.getElementById('learnSaveIcon').innerHTML = icon(savedPages.some(p => p.sheet === currentSheet && String(p.number) === String(item.number)) ? 'bookmarkFilled' : 'bookmark');

  const q = learnMode === 'KR_TO_VI' ? item.korean : item.vietnamese;
  const a = learnMode === 'KR_TO_VI' ? item.vietnamese : item.korean;
  document.getElementById('learnQuestion').textContent = q;
  document.getElementById('learnAnswer').textContent = a;

  document.getElementById('questionLabel').textContent = learnMode === 'KR_TO_VI' ? 'KO 한국어' : 'VI 베트남어';
  document.getElementById('answerLabel').textContent = learnMode === 'KR_TO_VI' ? 'VI 베트남어' : 'KO 한국어';

  document.getElementById('progressText').textContent = `${pos} / ${total}`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  const slider = document.getElementById('progressSlider');
  slider.max = total;
  slider.value = pos;

  cover.classList.toggle('hide', alwaysShowAnswer);
  document.getElementById('learnPrev').disabled = currentIndex === 0;
  document.getElementById('learnNext').disabled = currentIndex === total - 1;
  toggleBtn.textContent = alwaysShowAnswer ? '정답 항상 켜기' : '정답 항상 끄기';
  toggleBtn.classList.toggle('active', alwaysShowAnswer);
}

document.getElementById('learnPrev').onclick = () => {
  if (currentIndex > 0) {
    currentIndex--;
    renderLearn();
  }
};
document.getElementById('learnNext').onclick = () => {
  if (currentIndex < currentSentences.length - 1) {
    currentIndex++;
    renderLearn();
  }
};
document.getElementById('progressSlider').addEventListener('input', e => {
  const idx = Number(e.target.value) - 1;
  if (idx >= 0 && idx < currentSentences.length) {
    currentIndex = idx;
    renderLearn();
  }
});
document.getElementById('learnSwitch').onclick = () => {
  learnMode = learnMode === 'KR_TO_VI' ? 'VI_TO_KR' : 'KR_TO_VI';
  renderLearn();
};
toggleBtn.onclick = () => {
  alwaysShowAnswer = !alwaysShowAnswer;
  cover.classList.toggle('hide', alwaysShowAnswer);
  toggleBtn.textContent = alwaysShowAnswer ? '정답 항상 켜기' : '정답 항상 끄기';
  toggleBtn.classList.toggle('active', alwaysShowAnswer);
};
document.getElementById('showAnswerBtn').onclick = () => {
  cover.classList.toggle('hide');
};
document.getElementById('learnGoHome').onclick = showMainMenu;
document.getElementById('learnMainMenuBtn').onclick = showMainMenu;

document.getElementById('learnTTS').onclick = () => {
  speak(document.getElementById('learnQuestion').textContent, learnMode === 'KR_TO_VI' ? 'ko-KR' : 'vi-VN');
};
document.getElementById('learnTTSAnswer').onclick = () => {
  speak(document.getElementById('learnAnswer').textContent, learnMode === 'KR_TO_VI' ? 'vi-VN' : 'ko-KR');
};

function speak(text, lang) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = lang;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

document.getElementById('learnBookmark').onclick = () => {
  const item = currentSentences[currentIndex];
  const key = bookmarkKey(currentSheet, item.number);
  if (isBookmarked(item)) {
    delete bookmarks[key];
    delete bookmarks[item.number];
  } else {
    bookmarks[key] = true;
  }
  localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
  renderLearn();
};

document.getElementById('learnSaveIcon').onclick = () => {
  const item = currentSentences[currentIndex];
  const idx = savedPages.findIndex(p => p.sheet === currentSheet && String(p.number) === String(item.number));
  if (idx >= 0) {
    savedPages.splice(idx, 1);
  } else {
    savedPages.push({ sheet: currentSheet, number: item.number, korean: item.korean });
  }
  localStorage.setItem('savedPages', JSON.stringify(savedPages));
  renderLearn();
};

document.getElementById('goFavorite').onclick = async () => {
  showScreen('favorite');
  setLoading(true);

  const favEntries = Object.keys(bookmarks);
  if (!favEntries.length) {
    currentFavoriteItems = [];
    document.getElementById('favoriteList').innerHTML = emptyState('book', '단어장에 저장된 문장이 없습니다');
    setLoading(false);
    return;
  }

  try {
    const items = [];
    for (const entry of favEntries) {
      if (entry.includes('::')) {
        const [sheet, number] = entry.split('::');
        const rows = await getSentences(sheet);
        const found = rows.find(row => String(row.number) === String(number));
        if (found) items.push({ ...found, sheet });
      } else {
        const recovered = await getFavoriteSentences([entry]);
        items.push(...recovered);
      }
    }
    currentFavoriteItems = items;
    renderFavorite(filterFavoriteItems());
  } catch (e) {
    console.error(e);
    document.getElementById('favoriteList').innerHTML = `<div class="empty-state">${icon('alert')}<div>단어장을 불러오지 못했습니다<br>${e.message}</div></div>`;
  } finally {
    setLoading(false);
  }
};

function favoriteMatches(item, q) {
  if (!q) return true;
  const haystack = [item.sheet, item.number, item.korean, item.vietnamese].join(' ').toLowerCase();
  return haystack.includes(q.toLowerCase());
}
function filterFavoriteItems() {
  const q = document.getElementById('favoriteSearch')?.value.trim() || '';
  return currentFavoriteItems.filter(item => favoriteMatches(item, q));
}
function renderFavorite(items) {
  const box = document.getElementById('favoriteList');
  box.innerHTML = '';
  if (!items.length) {
    box.innerHTML = emptyState('book', currentFavoriteItems.length ? '검색 결과가 없습니다' : '단어장에 저장된 문장이 없습니다');
    return;
  }
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'fav-card';
    card.style.cursor = 'default';
    card.innerHTML = `
      <div class="fav-sheet">[${item.sheet}] ${item.number}번</div>
      <div class="fav-ko">${item.korean}</div>
      <div class="fav-vi">${item.vietnamese}</div>
    `;
    const del = document.createElement('button');
    del.className = 'fav-del';
    del.type = 'button';
    del.innerHTML = icon('x');
    del.onclick = e => {
      e.stopPropagation();
      delete bookmarks[bookmarkKey(item.sheet, item.number)];
      delete bookmarks[item.number];
      localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
      currentFavoriteItems = currentFavoriteItems.filter(row => !(row.sheet === item.sheet && String(row.number) === String(item.number)));
      renderFavorite(filterFavoriteItems());
    };
    card.appendChild(del);
    box.appendChild(card);
  });
}

document.getElementById('goSaved').onclick = () => {
  showScreen('saved');
  renderSaved();
};

function savedMatches(item, q) {
  if (!q) return true;
  const haystack = [item.sheet, item.number, item.korean].join(' ').toLowerCase();
  return haystack.includes(q.toLowerCase());
}
function filterSavedItems() {
  const q = document.getElementById('savedSearch')?.value.trim() || '';
  return currentSavedItems.filter(item => savedMatches(item, q));
}
function renderSaved(items = null) {
  const box = document.getElementById('savedList');
  if (items === null) {
    currentSavedItems = [...savedPages];
    items = filterSavedItems();
  }
  box.innerHTML = '';
  if (!items.length) {
    box.innerHTML = emptyState('bookmark', currentSavedItems.length ? '검색 결과가 없습니다' : '저장된 페이지가 없습니다');
    return;
  }
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'fav-card';
    card.innerHTML = `
      <div class="fav-sheet">[${item.sheet}] ${item.number}번</div>
      <div class="fav-ko">${item.korean}</div>
    `;
    const del = document.createElement('button');
    del.className = 'fav-del';
    del.type = 'button';
    del.innerHTML = icon('x');
    del.onclick = e => {
      e.stopPropagation();
      const idx = savedPages.findIndex(p => p.sheet === item.sheet && String(p.number) === String(item.number));
      if (idx >= 0) savedPages.splice(idx, 1);
      localStorage.setItem('savedPages', JSON.stringify(savedPages));
      currentSavedItems = [...savedPages];
      renderSaved(filterSavedItems());
    };
    card.appendChild(del);
    card.onclick = () => {
      showScreen('learn');
      loadLearnSheet(item.sheet, item.number);
    };
    box.appendChild(card);
  });
}

document.getElementById('topMainMenuBtn').onclick = showMainMenu;
document.getElementById('favoriteSearch').addEventListener('input', () => renderFavorite(filterFavoriteItems()));
document.getElementById('savedSearch').addEventListener('input', () => renderSaved(filterSavedItems()));
document.querySelectorAll('.menu-btn[data-category]').forEach(btn => {
  btn.addEventListener('click', () => openCategory(btn.dataset.category));
});
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.trim();
  const base = currentCategorySheets;
  renderSheetGrid(q ? base.filter(n => n.includes(q)) : base);
});

renderStaticIcons();
initTheme();
initHome();
</script>
</body>
